name: Feature request
description: Request a change with scope and constraints
title: '[feature] '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should be solved
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Suggested behavior, boundary, or policy
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Runtime, tenant, migration, or compatibility constraints
