<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCUM TH Platform | Preview</title>
  <link rel="stylesheet" href="/player/assets/ui/platform-site-v2.css">
</head>
<body class="public-v2">
  <div class="marketing-shell">
    <header class="marketing-topbar">
      <a class="marketing-brand" href="/landing">
        <span class="marketing-brand-mark">SCUM</span>
        <span class="marketing-brand-copy"><strong>SCUM TH Platform</strong><span>Preview tenant</span></span>
      </a>
      <div class="marketing-tools">
        <a id="previewUpgradeBtn" class="button button-primary" href="/checkout">อัปเกรดแพ็กเกจ</a>
        <button id="previewLogoutBtn" class="button" type="button">ออกจาก Preview</button>
      </div>
    </header>
    <main class="marketing-main">
      <section class="marketing-grid two-col">
        <aside class="marketing-panel">
          <div class="marketing-panel-head">
            <span class="marketing-kicker">Preview Tenant</span>
            <h2 id="previewCommunityName">SCUM Preview</h2>
            <p id="previewPageLead">กำลังโหลดโครงสร้าง Preview Mode...</p>
            <p id="previewAccountSummary"></p>
          </div>
          <div id="previewSidebarNav" class="preview-sidebar"></div>
        </aside>
        <section class="marketing-grid">
          <div id="previewStatsGrid" class="marketing-grid two-col"></div>
          <article class="marketing-panel"><h3>ฟีเจอร์ที่เปิดใช้</h3><ul id="previewFeatureList" class="marketing-list"></ul></article>
          <article class="marketing-panel"><h3>ฟีเจอร์ที่ยังล็อก</h3><ul id="previewLockedList" class="marketing-list"></ul></article>
          <article class="marketing-panel"><h3>สถานะการเชื่อมบัญชี</h3><ul id="previewIdentityList" class="marketing-list"></ul></article>
          <article class="marketing-panel"><h3>ลำดับถัดไป</h3><ul id="previewNextSteps" class="marketing-list"></ul></article>
        </section>
      </section>
    </main>
  </div>
  <script src="/player/assets/ui/portal-i18n.js"></script>
  <script src="/player/assets/ui/public-auth-v2.js"></script>
</body>
</html>
