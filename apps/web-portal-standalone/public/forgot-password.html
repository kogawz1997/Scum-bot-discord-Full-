<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCUM TH Platform | Forgot Password</title>
  <link rel="stylesheet" href="/player/assets/ui/platform-site-v2.css">
</head>
<body class="public-v2">
  <div class="marketing-shell">
    <header class="marketing-topbar">
      <a class="marketing-brand" href="/landing">
        <span class="marketing-brand-mark">SCUM</span>
        <span class="marketing-brand-copy"><strong>SCUM TH Platform</strong><span>Password reset</span></span>
      </a>
    </header>
    <main class="marketing-main">
      <section class="marketing-grid two-col">
        <article class="auth-card">
          <h2>ขอรีเซ็ตรหัสผ่าน</h2>
          <form id="publicPasswordResetForm" class="auth-form-grid">
            <input id="publicPasswordResetEmail" class="auth-input" type="email" placeholder="อีเมลที่ใช้สมัคร">
            <button id="publicPasswordResetSubmit" class="button button-primary" type="submit">ส่งคำขอรีเซ็ต</button>
            <div id="publicPasswordResetStatus" class="form-status" aria-live="polite"></div>
          </form>
        </article>
      </section>
    </main>
  </div>
  <script src="/player/assets/ui/portal-i18n.js"></script>
  <script src="/player/assets/ui/public-auth-v2.js"></script>
</body>
</html>
