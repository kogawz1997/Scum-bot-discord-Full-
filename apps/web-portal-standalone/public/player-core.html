<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>SCUM TH Platform | Player</title>
  <link rel="stylesheet" href="/player/assets/ui/player-v4-base.css">
  <link rel="stylesheet" href="/player/assets/ui/player-home-v4.css">
  <link rel="stylesheet" href="/player/assets/ui/player-commerce-v4.css">
  <link rel="stylesheet" href="/player/assets/ui/player-stats-events-support-v4.css">
  <style>
    body.plv4-preview-body{margin:0;padding:24px;background:#060907;color:#f4efe4;font-family:"IBM Plex Sans Thai","Segoe UI",sans-serif}
    .surface-utility{width:min(1480px,calc(100% - 32px));margin:0 auto 16px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .surface-status{display:flex;align-items:center;gap:12px;color:rgba(244,239,228,.74);font-size:13px}
    .surface-status strong{color:#f4efe4}
    .surface-status[data-tone="success"] strong{color:#89b86c}
    .surface-status[data-tone="danger"] strong{color:#d36d60}
    .surface-actions button{height:44px;padding:0 16px;border-radius:14px;border:1px solid rgba(212,186,113,.18);background:rgba(255,255,255,.03);color:#f4efe4;cursor:pointer}
    .surface-shell{width:min(1480px,calc(100% - 32px));margin:0 auto}
  </style>
</head>
<body class="plv4-preview-body" data-surface="player-v4">
  <div class="surface-utility">
    <div id="playerV4Status" class="surface-status" data-tone="muted"><strong>กำลังโหลด</strong><span>กำลังเตรียมพอร์ทัลผู้เล่น V4</span></div>
    <div class="surface-actions">
      <button id="playerV4RefreshBtn" type="button">รีเฟรชข้อมูล</button>
    </div>
  </div>
  <main id="playerV4AppRoot" class="surface-shell" aria-live="polite"></main>
  <script src="/player/assets/ui/player-v4-shared.js"></script>
  <script src="/player/assets/ui/player-home-v4.js"></script>
  <script src="/player/assets/ui/player-commerce-v4.js"></script>
  <script src="/player/assets/ui/player-stats-events-support-v4.js"></script>
  <script src="/player/assets/ui/player-v4-app.js"></script>
</body>
</html>
