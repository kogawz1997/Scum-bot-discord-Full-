<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCUM TH Platform | Login</title>
  <link rel="stylesheet" href="/player/assets/ui/platform-site-v2.css">
</head>
<body class="public-v2">
  <div class="marketing-shell">
    <header class="marketing-topbar">
      <a class="marketing-brand" href="/landing">
        <span class="marketing-brand-mark">SCUM</span>
        <span class="marketing-brand-copy"><strong>SCUM TH Platform</strong><span>Preview account access</span></span>
      </a>
      <nav class="marketing-nav">
        <a href="/landing">ภาพรวม</a>
        <a href="/pricing">แพ็กเกจ</a>
        <a href="/signup">สมัครใช้งาน</a>
        <a class="is-active" href="/login">เข้าสู่ระบบ</a>
      </nav>
    </header>
    <main class="marketing-main">
      <section class="marketing-grid two-col">
        <article class="auth-card">
          <h2>เข้าสู่ระบบ Preview</h2>
          <p>ใช้บัญชีที่สมัครไว้เพื่อกลับเข้าสู่ Preview Mode และดู tenant admin panel ต่อจากจุดเดิม</p>
          <form id="previewLoginForm" class="auth-form-grid">
            <input id="previewLoginEmail" class="auth-input" type="email" placeholder="อีเมล">
            <input id="previewLoginPassword" class="auth-input" type="password" placeholder="รหัสผ่าน">
            <button id="previewLoginSubmit" class="button button-primary" type="submit">เข้าสู่ระบบ</button>
            <div id="previewLoginStatus" class="form-status" aria-live="polite"></div>
          </form>
          <p><a class="marketing-inline-link" href="/forgot-password">ลืมรหัสผ่าน</a></p>
        </article>
        <article class="marketing-panel">
          <div class="marketing-panel-head">
            <span class="marketing-kicker">Session</span>
            <h3>กลับเข้าสู่ระบบเดิม</h3>
          </div>
          <div id="previewLoginSession" hidden></div>
        </article>
      </section>
    </main>
  </div>
  <script src="/player/assets/ui/portal-i18n.js"></script>
  <script src="/player/assets/ui/public-auth-v2.js"></script>
</body>
</html>
