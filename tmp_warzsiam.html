<script>
  // ????????????????? DOM ?????
  document.addEventListener('DOMContentLoaded', () => {
    const video = document.querySelector('.sparks-overlay');
    video.src = 'assets/img/sparks.mp4';
  });

  // ???????? fade out ????????? (??? throttle ???????????????)
  let ticking = false;
  function updateHeroOpacity() {
    const hero = document.querySelector('.hero-section');
    if (!hero) return;
    const scrollY = window.scrollY;
    const fadeOutPoint = 1000;
    hero.style.opacity = scrollY <= fadeOutPoint ? 1 - (scrollY / fadeOutPoint) : 0;
    ticking = false;
  }
  
  window.addEventListener('scroll', function () {
    if (!ticking) {
      window.requestAnimationFrame(updateHeroOpacity);
      ticking = true;
    }
  }, { passive: true });
</script>
