<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">SCUM TH Platform Architecture Overview</title>
  <desc id="desc">Runtime overview showing bot, worker, admin web, player portal, watcher, console agent, and PostgreSQL.</desc>
  <style>
    .bg { fill: #0b1220; }
    .card { fill: #132033; stroke: #38506e; stroke-width: 2; rx: 16; }
    .card2 { fill: #16263d; stroke: #446182; stroke-width: 2; rx: 16; }
    .db { fill: #1b2f4d; stroke: #7ba2d6; stroke-width: 2; rx: 22; }
    .line { stroke: #8cb4ff; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .line2 { stroke: #7fd1b9; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
    .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #f5f7fb; }
    .subtitle { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #a9b8cf; }
    .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #f5f7fb; }
    .text { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #c9d5e6; }
    .small { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #9cb0ca; }
    .tag { fill: #233754; stroke: #5477a3; stroke-width: 1; rx: 10; }
    .tagText { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #dce7f9; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8cb4ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7fd1b9"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1280" height="760"/>
  <text class="title" x="48" y="52">SCUM TH Platform Architecture Overview</text>
  <text class="subtitle" x="48" y="82">Repository-aligned runtime view. Source files are named inside each runtime box.</text>

  <rect class="card" x="48" y="130" width="250" height="150"/>
  <text class="label" x="72" y="168">Discord Bot</text>
  <text class="text" x="72" y="198">Entry: src/bot.js</text>
  <text class="text" x="72" y="222">Bootstrap: src/bootstrap/</text>
  <text class="text" x="72" y="246">Roles: gateway, commands, admin mount</text>
  <rect class="tag" x="72" y="256" width="92" height="22"/>
  <text class="tagText" x="86" y="271">bot runtime</text>

  <rect class="card" x="48" y="336" width="250" height="150"/>
  <text class="label" x="72" y="374">Worker</text>
  <text class="text" x="72" y="404">Entry: src/worker.js</text>
  <text class="text" x="72" y="428">Delivery + rent queue runtime</text>
  <text class="text" x="72" y="452">Background jobs and health server</text>
  <rect class="tag" x="72" y="462" width="110" height="22"/>
  <text class="tagText" x="86" y="477">queue runtime</text>

  <rect class="card" x="48" y="542" width="250" height="130"/>
  <text class="label" x="72" y="580">Watcher</text>
  <text class="text" x="72" y="610">src/services/scumLogWatcherRuntime.js</text>
  <text class="text" x="72" y="634">Reads SCUM.log and posts webhook events</text>

  <rect class="card2" x="404" y="120" width="300" height="170"/>
  <text class="label" x="428" y="158">Admin Web</text>
  <text class="text" x="428" y="188">Entry: src/adminWebServer.js</text>
  <text class="text" x="428" y="212">Routes: src/admin/api/</text>
  <text class="text" x="428" y="236">Auth: src/admin/auth/</text>
  <text class="text" x="428" y="260">UI: src/admin/dashboard.html + assets/</text>
  <rect class="tag" x="428" y="266" width="136" height="22"/>
  <text class="tagText" x="442" y="281">admin control plane</text>

  <rect class="card2" x="404" y="346" width="300" height="170"/>
  <text class="label" x="428" y="384">Player Portal</text>
  <text class="text" x="428" y="414">Entry: apps/web-portal-standalone/server.js</text>
  <text class="text" x="428" y="438">API: api/ + auth/ + runtime/</text>
  <text class="text" x="428" y="462">Wallet, profile, redeem, purchases</text>
  <rect class="tag" x="428" y="492" width="110" height="22"/>
  <text class="tagText" x="442" y="507">player surface</text>

  <rect class="db" x="790" y="246" width="230" height="180"/>
  <text class="label" x="845" y="300">PostgreSQL</text>
  <text class="text" x="826" y="330">Runtime DB provider</text>
  <text class="text" x="826" y="354">Prisma-managed schema</text>
  <text class="text" x="826" y="378">Tenant-scoped application data</text>

  <rect class="card" x="1080" y="140" width="160" height="120"/>
  <text class="label" x="1104" y="178">RCON</text>
  <text class="text" x="1104" y="208">Delivery backend</text>
  <text class="text" x="1104" y="232">Default runtime path</text>

  <rect class="card" x="1060" y="322" width="180" height="160"/>
  <text class="label" x="1084" y="360">Console Agent</text>
  <text class="text" x="1084" y="390">src/services/scumConsoleAgent.js</text>
  <text class="text" x="1084" y="414">PowerShell bridge</text>
  <text class="text" x="1084" y="438">SCUM admin client</text>
  <rect class="tag" x="1084" y="446" width="118" height="22"/>
  <text class="tagText" x="1098" y="461">optional runtime</text>

  <path class="line" d="M298 205 C340 205, 350 205, 404 205"/>
  <path class="line" d="M298 410 C340 410, 350 430, 404 430"/>
  <path class="line" d="M298 605 C420 605, 420 565, 420 516"/>
  <path class="line2" d="M704 205 C752 205, 760 260, 790 300"/>
  <path class="line2" d="M704 430 C752 430, 760 392, 790 372"/>
  <path class="line2" d="M298 410 C540 410, 540 530, 1060 530"/>
  <path class="line2" d="M298 605 C560 605, 560 460, 1060 460"/>
  <path class="line" d="M1020 300 C1048 300, 1048 220, 1080 220"/>
  <path class="line" d="M1020 390 C1036 390, 1036 390, 1060 390"/>

  <text class="small" x="48" y="724">Generated asset for repository evidence. Live screenshots and in-game proof still depend on runtime capture.</text>
</svg>
