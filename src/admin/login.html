<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCUM Admin Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0d09;
      --bg-alt: #11150f;
      --panel: rgba(16, 20, 15, 0.94);
      --panel-soft: rgba(20, 26, 19, 0.88);
      --line: rgba(214, 221, 154, 0.14);
      --line-strong: rgba(229, 235, 183, 0.26);
      --text: #f1f2e7;
      --muted: #b8be9a;
      --accent: #d5dc93;
      --success: #90c27b;
      --warning: #d2a463;
      --danger: #cc7760;
      --radius-lg: 22px;
      --radius-md: 16px;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }

    html {
      color-scheme: dark;
    }

    select,
    select option,
    select optgroup {
      color-scheme: dark;
    }

    select option,
    select optgroup {
      background: #121212 !important;
      color: #f4f1e8 !important;
    }

    select option:checked,
    select option:hover,
    select option:focus {
      background: #2d61a8 !important;
      color: #ffffff !important;
    }

    select option:disabled,
    select optgroup {
      color: #b6b6b6 !important;
    }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 18px;
        color: var(--text);
        background:
          radial-gradient(980px 640px at 100% 0%, rgba(173, 84, 48, 0.16), transparent 52%),
          radial-gradient(900px 620px at 0% 100%, rgba(169, 180, 87, 0.09), transparent 58%),
          linear-gradient(165deg, #060806, var(--bg) 48%, #111510);
      font-family: "IBM Plex Sans Thai", "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.12;
    }

    .page {
      width: min(1440px, calc(100% - 8px));
      margin: 0 auto;
      display: grid;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .commandbar {
      position: sticky;
      top: 12px;
      z-index: 20;
    }

    .commandbar-inner {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
        linear-gradient(180deg, rgba(18, 24, 18, 0.96), rgba(9, 12, 9, 0.95));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }

    .emblem {
      min-width: 54px;
      min-height: 54px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid rgba(214, 221, 154, 0.18);
      background: linear-gradient(180deg, rgba(98, 107, 55, 0.42), rgba(27, 33, 22, 0.92));
      color: var(--text);
      font-family: "Barlow Condensed", sans-serif;
      font-size: 23px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand-copy {
      display: grid;
      gap: 2px;
    }

    .brand-copy strong {
      font-size: 18px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .brand-copy span {
      color: rgba(233, 238, 208, 0.62);
      font-size: 12px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .role-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .role-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: rgba(240, 243, 222, 0.76);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .role-chip.active {
      border-color: rgba(216, 226, 136, 0.28);
      background: linear-gradient(180deg, rgba(110, 124, 62, 0.44), rgba(29, 34, 24, 0.92));
      color: #fbfcf0;
    }

    .screen {
      width: min(1180px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background:
        radial-gradient(circle at right top, rgba(166, 77, 49, 0.15), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.012)),
        var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.04fr 0.96fr;
    }

    .hero,
    .auth {
      padding: 24px;
      display: grid;
      gap: 14px;
    }

    .hero {
      border-right: 1px solid var(--line);
      align-content: start;
      background:
        linear-gradient(180deg, rgba(9, 11, 9, 0.58), rgba(9, 11, 9, 0.86)),
        url("/admin/assets/visuals/tunnel/tunnel_512.jpg") center/cover;
    }

    .tag {
      width: fit-content;
      min-height: 30px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2 {
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 0.92;
    }

    h1 { font-size: clamp(44px, 6vw, 68px); }
    h2 { font-size: 42px; }

    p,
    .hint,
    label span {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .specs {
      display: grid;
      gap: 10px;
    }

    .spec {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.04);
      display: grid;
      gap: 4px;
    }

    .spec .k {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .spec .v {
      font-size: 18px;
      font-weight: 700;
    }

    .auth-topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .language-picker {
      display: grid;
      gap: 6px;
      min-width: 172px;
    }

    .language-picker span {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      user-select: none;
      -webkit-user-select: none;
    }

    .language-select {
      min-height: 40px;
      border-radius: 12px;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
      padding: 0 12px;
      color-scheme: dark;
      appearance: none;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
    }

    input,
    button {
      width: 100%;
      border-radius: 14px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      outline: none;
      font: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    input:focus {
      border-color: rgba(148, 208, 255, 0.58);
      box-shadow: 0 0 0 2px rgba(84, 181, 255, 0.12);
    }

    #loginBtn,
    #discordSsoBtn {
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease;
    }

    #loginBtn:hover,
    #discordSsoBtn:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
    }

    #loginBtn {
      background: linear-gradient(135deg, rgba(190, 198, 111, 0.96), rgba(229, 234, 176, 0.88));
      color: #10150d;
      border-color: transparent;
      font-weight: 700;
    }

    #discordSsoBtn {
      display: none;
    }

    .error {
      min-height: 22px;
      color: var(--danger);
      font-weight: 700;
    }

    @media (max-width: 920px) {
      .commandbar {
        position: static;
      }

      .commandbar-inner {
        grid-template-columns: 1fr;
      }

      .role-nav {
        justify-content: flex-start;
      }

      .screen {
        grid-template-columns: 1fr;
      }

      .hero {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }

    @media (max-width: 620px) {
      .hero,
      .auth {
        padding: 18px;
      }

      h2 {
        font-size: 34px;
      }
    }

    /* Cinematic admin login pass:
       keep auth and routes intact, but push the page toward a flatter
       black navigation and game-style split login/promo layout. */
    body.admin-login-screen {
      padding: 0;
      background:
        linear-gradient(180deg, rgba(4, 4, 4, 0.68), rgba(4, 4, 4, 0.94)),
        url("/admin/assets/visuals/tunnel/tunnel_512.jpg") center top / cover fixed;
    }

    body.admin-login-screen::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 0%, rgba(238, 186, 94, 0.14), transparent 22%),
        radial-gradient(circle at 0% 100%, rgba(118, 128, 70, 0.12), transparent 24%);
    }

    .page {
      width: 100%;
      min-height: 100vh;
      gap: 0;
    }

    .commandbar {
      top: 0;
      margin: 0;
      padding: 0;
    }

    .commandbar-inner {
      width: min(1600px, calc(100% - 32px));
      margin: 0 auto;
      padding: 14px 24px;
      border-radius: 0 0 20px 20px;
      border-top: 0;
      border-color: rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(6, 6, 6, 0.96), rgba(10, 10, 10, 0.94));
      box-shadow: 0 20px 52px rgba(0, 0, 0, 0.44);
    }

    .emblem {
      min-width: 46px;
      min-height: 46px;
      border-radius: 999px;
      border-color: rgba(255, 255, 255, 0.14);
      background: radial-gradient(circle at 30% 30%, rgba(219, 63, 35, 0.96), rgba(89, 12, 11, 0.98));
      font-size: 17px;
    }

    .role-chip {
      min-height: 40px;
      padding: 0 18px;
      border-radius: 10px;
      border-color: transparent;
      background: transparent;
      color: rgba(255, 255, 255, 0.86);
      font-family: "Barlow Condensed", sans-serif;
      font-size: 16px;
      letter-spacing: 0.02em;
      text-transform: none;
    }

    .role-chip.active,
    .role-chip:hover {
      border-color: rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.08);
      color: #fffdf4;
    }

    .screen {
      width: min(1120px, calc(100% - 40px));
      margin: 76px auto 0;
      grid-template-columns: minmax(0, 0.96fr) minmax(0, 0.84fr);
      border-radius: 28px;
      border-color: rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(10, 10, 10, 0.82), rgba(12, 12, 12, 0.9));
      box-shadow: 0 32px 72px rgba(0, 0, 0, 0.48);
    }

    .hero,
    .auth {
      padding: 34px;
    }

    .hero {
      order: 2;
      min-height: 620px;
      align-content: end;
      border-right: 0;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(42, 32, 12, 0.28), rgba(10, 10, 10, 0.56)),
        linear-gradient(90deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.48)),
        url("/admin/assets/visuals/scum/scum_512.jpg") center / cover;
    }

    .auth {
      order: 1;
      align-content: center;
      background: linear-gradient(180deg, rgba(14, 14, 14, 0.88), rgba(20, 20, 20, 0.82));
    }

    .auth-footer {
      display: flex;
      justify-content: flex-start;
      margin-top: 4px;
    }

    .auth-footer .login-language-picker {
      min-width: 148px;
    }

    .auth-footer .login-language-picker span {
      display: none;
    }

    .auth-footer .language-select {
      min-height: 40px;
    }

    .hero h1 {
      font-size: clamp(46px, 6vw, 72px);
    }

    .auth h2 {
      font-size: 54px;
    }

    .spec {
      background: rgba(8, 8, 8, 0.48);
      border-color: rgba(255, 255, 255, 0.08);
    }

    input,
    .language-select {
      border-color: rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
    }

    #loginBtn {
      background: linear-gradient(135deg, #d1b06a, #efe0a7);
      color: #111;
    }

    @media (max-width: 980px) {
      .commandbar-inner,
      .screen {
        width: min(100%, calc(100% - 20px));
      }

      .screen {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: 360px;
        border-left: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
    }
  </style>
</head>
<body class="admin-login-screen">
  <div class="page">
    <section class="screen">
    <!-- Keep the left rail as a pure visual panel so the login form stays focused. -->
    <aside class="hero" aria-hidden="true"></aside>

    <div class="auth">
      <h2 data-i18n="login.enterTitle">ADMIN WEB</h2>
      <p data-i18n="login.enterSubtitle">Use your admin account to open the correct console automatically after authentication.</p>

      <form id="loginForm" autocomplete="on">
        <label>
          <span data-i18n="common.username">Username</span>
          <input id="usernameInput" name="username" autocomplete="username" placeholder="admin-owner" required>
        </label>
        <label>
          <span data-i18n="common.password">Password</span>
          <input id="passwordInput" name="password" type="password" autocomplete="current-password" required>
        </label>
        <label>
          <span data-i18n="common.twoFactorOptional">2FA Code (optional)</span>
          <input id="otpInput" name="otp" inputmode="numeric" pattern="\\d{6}" maxlength="6" placeholder="123456">
        </label>
        <button id="loginBtn" type="submit" data-i18n="login.signIn">Sign In</button>
      </form>

      <button id="discordSsoBtn" type="button">Continue with Discord SSO</button>
      <div id="errorText" class="error"></div>
      <p id="sourceHint" class="hint" data-i18n="login.sourceHint">Admin users are read from the database first. Session policy, 2FA, and rate limiting remain enforced after the redesign.</p>
      <div class="auth-footer">
        <label class="language-picker login-language-picker">
          <span data-i18n="common.language">Language</span>
          <select id="adminLanguageSelect" class="language-select"></select>
        </label>
      </div>
    </div>
    </section>
  </div>

    <script src="/admin/assets/admin-i18n.js?v=20260321-select-fix"></script>
  <script>
    const form = document.getElementById('loginForm');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const otpInput = document.getElementById('otpInput');
    const loginBtn = document.getElementById('loginBtn');
    const discordSsoBtn = document.getElementById('discordSsoBtn');
    const errorText = document.getElementById('errorText');
    const sourceHint = document.getElementById('sourceHint');

    async function api(path, method = 'GET', body = null) {
      const headers = {};
      let payload;
      if (body != null) {
        headers['content-type'] = 'application/json';
        payload = JSON.stringify(body);
      }
      const res = await fetch(path, {
        method,
        headers,
        body: payload,
        credentials: 'same-origin',
      });
      const data = await res.json().catch(() => ({ ok: false, error: 'Invalid response format' }));
      if (!res.ok || data.ok === false) {
        throw new Error(data.error || `Request failed (${res.status})`);
      }
      return data;
    }

    async function ensureNotLoggedIn() {
      try {
        await api('/admin/api/me');
        window.location.replace(getPostLoginTarget());
      } catch {
        // not logged in
      }
    }

    function getPostLoginTarget() {
      const params = new URLSearchParams(window.location.search);
      const next = String(params.get('next') || '').trim();
      if (next.startsWith('/owner')) return '/owner';
      if (next.startsWith('/tenant')) return '/tenant';
      const path = String(window.location.pathname || '').trim().toLowerCase();
      if (path === '/owner/login' || path === '/owner/login/') return '/owner';
      if (path === '/tenant/login' || path === '/tenant/login/') return '/tenant';
      return '/admin';
    }

    async function loadAuthProviders() {
      try {
        const providers = await api('/admin/api/auth/providers', 'GET');
        if (providers?.data?.discordSso) {
          discordSsoBtn.style.display = 'block';
        }
        if (providers?.data?.loginSource === 'database' && sourceHint) {
          sourceHint.textContent = 'Database-backed admin accounts remain the primary login source. Session, 2FA, and rate limit policy are unchanged.';
        }
      } catch {
        // ignore
      }
    }

    function showErrorFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const message = String(params.get('error') || '').trim();
      if (message) {
        errorText.textContent = message;
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorText.textContent = '';
      loginBtn.disabled = true;
      const originalText = loginBtn.textContent;
      loginBtn.textContent = window.AdminUiI18n?.t('login.signingIn', 'Signing in...') || 'Signing in...';
      try {
        await api('/admin/api/login', 'POST', {
          username: usernameInput.value.trim(),
          password: passwordInput.value,
          otp: otpInput.value.trim() || undefined,
        });
        window.location.replace(getPostLoginTarget());
      } catch (error) {
        errorText.textContent = error.message || (window.AdminUiI18n?.t('login.signInFailed', 'Sign in failed') || 'Sign in failed');
        if (/2FA|OTP/i.test(errorText.textContent)) {
          otpInput.focus();
        } else {
          passwordInput.focus();
        }
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = originalText;
      }
    });

    discordSsoBtn?.addEventListener('click', () => {
      window.location.href = '/admin/auth/discord/start';
    });

    window.AdminUiI18n?.init(['adminLanguageSelect']);
    showErrorFromQuery();
    loadAuthProviders();
    ensureNotLoggedIn();
  </script>
</body>
</html>
