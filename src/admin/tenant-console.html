<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>SCUM TH Platform | Tenant</title>
  <link rel="stylesheet" href="/admin/assets/tenant-dashboard-v4.css">
  <link rel="stylesheet" href="/admin/assets/tenant-server-status-v4.css">
  <link rel="stylesheet" href="/admin/assets/tenant-server-config-v4.css">
  <link rel="stylesheet" href="/admin/assets/tenant-orders-v4.css">
  <link rel="stylesheet" href="/admin/assets/tenant-players-v4.css">
  <link rel="stylesheet" href="/admin/assets/tenant-delivery-agents-v4.css">
  <link rel="stylesheet" href="/admin/assets/tenant-server-bots-v4.css">
  <link rel="stylesheet" href="/admin/assets/tenant-restart-control-v4.css">
  <style>
    body.tdv4-preview-body{margin:0;padding:24px;background:#060907;color:#f4efe4;font-family:"IBM Plex Sans Thai","Segoe UI",sans-serif}
    .surface-utility{width:min(1480px,calc(100% - 32px));margin:0 auto 16px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .surface-status{display:flex;align-items:center;gap:12px;color:rgba(244,239,228,.74);font-size:13px}
    .surface-status strong{color:#f4efe4}
    .surface-status[data-tone="success"] strong{color:#89b86c}
    .surface-status[data-tone="danger"] strong{color:#d36d60}
    .surface-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .surface-actions button,.surface-actions select{height:44px;padding:0 16px;border-radius:14px;border:1px solid rgba(212,186,113,.18);background:rgba(255,255,255,.03);color:#f4efe4}
    .surface-actions button{cursor:pointer}
    .surface-shell{width:min(1480px,calc(100% - 32px));margin:0 auto}
  </style>
</head>
<body class="tdv4-preview-body" data-surface="tenant-v4">
  <div class="surface-utility">
    <div id="tenantV4Status" class="surface-status" data-tone="muted"><strong>กำลังโหลด</strong><span>กำลังเตรียมพื้นผิวแอดมินผู้เช่า V4</span></div>
    <div class="surface-actions">
      <label id="tenantOwnerScopeWrap" hidden>
        <select id="tenantOwnerScopeSelect" aria-label="เลือก tenant"></select>
      </label>
      <button id="tenantV4RefreshBtn" type="button">รีเฟรชข้อมูล</button>
    </div>
  </div>
  <main id="tenantV4AppRoot" class="surface-shell" aria-live="polite"></main>
  <script src="/admin/assets/tenant-dashboard-v4.js"></script>
  <script src="/admin/assets/tenant-server-status-v4.js"></script>
  <script src="/admin/assets/tenant-server-config-v4.js"></script>
  <script src="/admin/assets/tenant-orders-v4.js"></script>
  <script src="/admin/assets/tenant-players-v4.js"></script>
  <script src="/admin/assets/tenant-delivery-agents-v4.js"></script>
  <script src="/admin/assets/tenant-server-bots-v4.js"></script>
  <script src="/admin/assets/tenant-restart-control-v4.js"></script>
  <script src="/admin/assets/tenant-v4-app.js"></script>
</body>
</html>
