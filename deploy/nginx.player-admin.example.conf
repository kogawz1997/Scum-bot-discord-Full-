# Example Nginx reverse proxy for SCUM platform

server {
  listen 443 ssl http2;
  server_name admin.example.com;

  # ssl_certificate /etc/letsencrypt/live/admin.example.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/admin.example.com/privkey.pem;

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://127.0.0.1:3200;
  }
}

server {
  listen 443 ssl http2;
  server_name player.example.com;

  # ssl_certificate /etc/letsencrypt/live/player.example.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/player.example.com/privkey.pem;

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_pass http://127.0.0.1:3300;
  }
}
